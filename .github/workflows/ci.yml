name: MVP CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-fast:
    name: Backend Fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore OpsSphere.slnx

      - name: Build
        run: dotnet build OpsSphere.slnx --no-restore

      - name: Test Domain
        run: dotnet test tests/OpsSphere.Domain.Tests --no-build

      - name: Test Application
        run: dotnet test tests/OpsSphere.Application.Tests --no-build

  integration-fast:
    name: Integration Fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore OpsSphere.slnx

      - name: Build
        run: dotnet build OpsSphere.slnx --no-restore

      - name: Test Integration (fast)
        run: dotnet test tests/OpsSphere.IntegrationTests --no-build --filter "Category!=Heavy"

  integration-heavy:
    name: Integration Heavy (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore OpsSphere.slnx

      - name: Build
        run: dotnet build OpsSphere.slnx --no-restore

      - name: Test Integration (heavy)
        run: dotnet test tests/OpsSphere.IntegrationTests --no-build --filter "Category=Heavy"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci
