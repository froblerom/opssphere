services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: opssphere-sqlserver
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: ${MSSQL_PID}
    ports:
      - "${SQLSERVER_HOST_PORT:-1433}:${SQLSERVER_CONTAINER_PORT:-1433}"
    volumes:
      - opssphere-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  opssphere-sqlserver-data:
